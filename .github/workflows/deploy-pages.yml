name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main # Nhánh chính của bạn (đổi thành master nếu bạn dùng master)
  workflow_dispatch: # Cho phép trigger build thủ công trên GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=blog-khaizinam # Đổi 'blog-khaizinam' thành tên project của bạn trên Cloudflare Pages
